services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradehub_data}
      POSTGRES_USER: ${POSTGRES_USER:-tradehub_data}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradehub_data}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradehub_data} -d ${POSTGRES_DB:-tradehub_data}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      TRADEHUB_DATA_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tradehub_data}:${POSTGRES_PASSWORD:-tradehub_data}@postgres:5432/${POSTGRES_DB:-tradehub_data}
    ports:
      - "${TRADEHUB_DATA_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
